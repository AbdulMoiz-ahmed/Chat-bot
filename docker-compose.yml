version: '3.8'

services:
  chatbot-backend:
    image: abdulrafay70/chatbot-backend:latest
    container_name: chatbot-backend-1
    ports:
      - "127.0.0.1:10006:8000"
    environment:
      - HOST=0.0.0.0
      - ENVIRONMENT=production
    restart: always

  chatbot-frontend:
    image: abdulrafay70/chatbot-frontend:latest
    container_name: chatbot-frontend-1
    ports:
      - "127.0.0.1:10007:3000"
    restart: always
